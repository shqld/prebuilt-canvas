name: Build and Publish Prebuilds
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSIONS: '18 20 22 24'

jobs:
  validate:
    name: Validate package versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check optionalDependencies match package version
        run: |
          node -e "
            const pkg = require('./package.json');
            const version = pkg.version;
            const mismatched = Object.entries(pkg.optionalDependencies || {})
              .filter(([, v]) => v !== version);
            if (mismatched.length) {
              console.error('optionalDependencies version mismatch:');
              mismatched.forEach(([name, v]) =>
                console.error('  ' + name + ': ' + v + ' (expected ' + version + ')'));
              process.exit(1);
            }
            console.log('All optionalDependencies match version ' + version);
          "

  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build and test Node 18-22, package (Debian 10)
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/work -w /work \
            -e NODE_VERSIONS="18 20 22" \
            zbbjornson/canvas-prebuilt:11 bash -c '
              set -ex
              ORIG_PATH=$PATH
              mkdir -p /tmp/prebuilt-nodes
              cp prebuild/Linux/binding.gyp binding.gyp
              for NODE_VER in $NODE_VERSIONS; do
                echo "=== Installing Node $NODE_VER ==="
                curl -fsSL "https://nodejs.org/dist/latest-v${NODE_VER}.x/SHASUMS256.txt" > /tmp/shasums.txt
                NODE_FULL=$(grep "linux-x64.tar.gz" /tmp/shasums.txt | head -1 | awk "{print \$2}" | sed "s/-linux-x64.tar.gz//" | sed "s/node-v//")
                mkdir -p /opt/node-${NODE_VER}
                curl -fsSL "https://nodejs.org/dist/v${NODE_FULL}/node-v${NODE_FULL}-linux-x64.tar.gz" | tar -xz -C /opt/node-${NODE_VER} --strip-components=1
                export PATH=/opt/node-${NODE_VER}/bin:$ORIG_PATH
                ABI=$(node -p "process.versions.modules")
                echo "Building for Node $NODE_VER ($NODE_FULL, ABI $ABI)..."
                rm -rf node_modules
                npm install --ignore-scripts
                npx --yes node-gyp rebuild -j 2
                cp build/Release/canvas.node "/tmp/prebuilt-nodes/canvas-node-v${ABI}.node"
              done
              cp /tmp/prebuilt-nodes/canvas-node-v*.node build/Release/
              . prebuild/Linux/bundle.sh
              # Test each version
              for NODE_VER in $NODE_VERSIONS; do
                export PATH=/opt/node-${NODE_VER}/bin:$ORIG_PATH
                echo "=== Testing with Node $(node --version) (ABI $(node -p process.versions.modules)) ==="
                DEBUG_CANVAS=1 node test/smoke.js
              done
              # Package
              export PATH=/opt/node-22/bin:$ORIG_PATH
              node prebuild/package-platform.js linux-x64-gnu build/Release
            '
      - name: Build and test Node 24 (bookworm)
        run: |
          # Save Node 18-22 artifacts before node-gyp rebuild destroys them
          cp -r build/Release /tmp/prebuilt-release
          docker run --rm -v $GITHUB_WORKSPACE:/work -w /work \
            ghcr.io/shqld/prebuilt-canvas/builder:bookworm-x64 bash -c '
              set -ex
              curl -fsSL "https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt" > /tmp/shasums.txt
              NODE_FULL=$(grep "linux-x64.tar.gz" /tmp/shasums.txt | head -1 | awk "{print \$2}" | sed "s/-linux-x64.tar.gz//" | sed "s/node-v//")
              mkdir -p /opt/node-24
              curl -fsSL "https://nodejs.org/dist/v${NODE_FULL}/node-v${NODE_FULL}-linux-x64.tar.gz" | tar -xz -C /opt/node-24 --strip-components=1
              export PATH=/opt/node-24/bin:$PATH
              ABI=$(node -p "process.versions.modules")
              echo "Building for Node 24 ($NODE_FULL, ABI $ABI)..."
              cp prebuild/Linux/binding.gyp binding.gyp
              rm -rf node_modules
              npm install --ignore-scripts
              npx --yes node-gyp rebuild -j 2
              cp build/Release/canvas.node "build/Release/canvas-node-v${ABI}.node"
            '
          # Restore Node 18-22 artifacts
          cp /tmp/prebuilt-release/canvas-node-v*.node build/Release/
          cp /tmp/prebuilt-release/*.so* build/Release/
          cp /tmp/prebuilt-release/package.json build/Release/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-linux-x64-gnu
          path: build/Release/

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build and test Node 18-22, package (Debian 10)
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/work -w /work \
            -e NODE_VERSIONS="18 20 22" \
            chearon/canvas-prebuilt-arm:1 bash -c '
              set -ex
              ORIG_PATH=$PATH
              mkdir -p /tmp/prebuilt-nodes
              cp prebuild/Linux/binding.gyp binding.gyp
              for NODE_VER in $NODE_VERSIONS; do
                echo "=== Installing Node $NODE_VER ==="
                curl -fsSL "https://nodejs.org/dist/latest-v${NODE_VER}.x/SHASUMS256.txt" > /tmp/shasums.txt
                NODE_FULL=$(grep "linux-arm64.tar.gz" /tmp/shasums.txt | head -1 | awk "{print \$2}" | sed "s/-linux-arm64.tar.gz//" | sed "s/node-v//")
                mkdir -p /opt/node-${NODE_VER}
                curl -fsSL "https://nodejs.org/dist/v${NODE_FULL}/node-v${NODE_FULL}-linux-arm64.tar.gz" | tar -xz -C /opt/node-${NODE_VER} --strip-components=1
                export PATH=/opt/node-${NODE_VER}/bin:$ORIG_PATH
                ABI=$(node -p "process.versions.modules")
                echo "Building for Node $NODE_VER ($NODE_FULL, ABI $ABI)..."
                rm -rf node_modules
                npm install --ignore-scripts
                npx --yes node-gyp rebuild -j 2
                cp build/Release/canvas.node "/tmp/prebuilt-nodes/canvas-node-v${ABI}.node"
              done
              cp /tmp/prebuilt-nodes/canvas-node-v*.node build/Release/
              . prebuild/Linux/bundle.sh
              # Test each version
              for NODE_VER in $NODE_VERSIONS; do
                export PATH=/opt/node-${NODE_VER}/bin:$ORIG_PATH
                echo "=== Testing with Node $(node --version) (ABI $(node -p process.versions.modules)) ==="
                DEBUG_CANVAS=1 node test/smoke.js
              done
              # Package
              export PATH=/opt/node-22/bin:$ORIG_PATH
              node prebuild/package-platform.js linux-arm64-gnu build/Release
            '
      - name: Build and test Node 24 (bookworm)
        run: |
          cp -r build/Release /tmp/prebuilt-release
          docker run --rm -v $GITHUB_WORKSPACE:/work -w /work \
            ghcr.io/shqld/prebuilt-canvas/builder:bookworm-arm64 bash -c '
              set -ex
              curl -fsSL "https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt" > /tmp/shasums.txt
              NODE_FULL=$(grep "linux-arm64.tar.gz" /tmp/shasums.txt | head -1 | awk "{print \$2}" | sed "s/-linux-arm64.tar.gz//" | sed "s/node-v//")
              mkdir -p /opt/node-24
              curl -fsSL "https://nodejs.org/dist/v${NODE_FULL}/node-v${NODE_FULL}-linux-arm64.tar.gz" | tar -xz -C /opt/node-24 --strip-components=1
              export PATH=/opt/node-24/bin:$PATH
              ABI=$(node -p "process.versions.modules")
              echo "Building for Node 24 ($NODE_FULL, ABI $ABI)..."
              cp prebuild/Linux/binding.gyp binding.gyp
              rm -rf node_modules
              npm install --ignore-scripts
              npx --yes node-gyp rebuild -j 2
              cp build/Release/canvas.node "build/Release/canvas-node-v${ABI}.node"
            '
          cp /tmp/prebuilt-release/canvas-node-v*.node build/Release/
          cp /tmp/prebuilt-release/*.so* build/Release/
          cp /tmp/prebuilt-release/package.json build/Release/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-linux-arm64-gnu
          path: build/Release/

  build-darwin-x64:
    name: macOS x64 (Rosetta)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
      - name: Install x86_64 Homebrew and deps
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install pkg-config cairo pango librsvg giflib
      - name: Setup x86_64 nvm
        run: |
          arch -x86_64 /bin/bash -c "curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
      - name: Build all Node versions
        run: |
          arch -x86_64 /bin/bash -c "
            set -ex
            export PATH=/usr/local/bin:\$PATH
            source ~/.nvm/nvm.sh
            mkdir -p /tmp/prebuilt-nodes
            for NODE_VER in $NODE_VERSIONS; do
              nvm install \$NODE_VER && nvm use \$NODE_VER
              ABI=\$(node -p 'process.versions.modules')
              echo \"Building for Node \$NODE_VER (ABI \$ABI)...\"
              rm -rf node_modules ~/.npm/_npx
              npm install --ignore-scripts
              cp prebuild/macOS/binding.gyp binding.gyp
              npx --yes node-gyp rebuild -j 2
              cp build/Release/canvas.node /tmp/prebuilt-nodes/canvas-node-v\${ABI}.node
            done
            cp /tmp/prebuilt-nodes/canvas-node-v*.node build/Release/
            pip3 install --user --break-system-packages macpack
            . prebuild/macOS/bundle.sh
          "
      - name: Verify architecture
        run: file build/Release/canvas-node-v*.node | grep x86_64
      - name: Sign
        run: |
          for file in build/Release/*; do
            codesign --deep --force --sign - "$file"
          done
      - name: Test binary (all Node versions)
        run: |
          arch -x86_64 /bin/bash -c "
            set -ex
            export PATH=/usr/local/bin:\$PATH
            source ~/.nvm/nvm.sh
            brew uninstall --force --ignore-dependencies cairo pango librsvg giflib harfbuzz 2>/dev/null || true
            for NODE_VER in $NODE_VERSIONS; do
              nvm use \$NODE_VER
              echo \"=== Testing with Node \$(node --version) (ABI \$(node -p process.versions.modules)) ===\"
              node test/smoke.js
            done
          "
      - name: Package
        run: node prebuild/package-platform.js darwin-x64 build/Release
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-darwin-x64
          path: build/Release/

  build-darwin-arm64:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: . prebuild/macOS/preinstall.sh
      - name: Build all Node versions
        run: |
          set -ex
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
          source ~/.nvm/nvm.sh
          mkdir -p /tmp/prebuilt-nodes
          for NODE_VER in $NODE_VERSIONS; do
            nvm install $NODE_VER && nvm use $NODE_VER
            ABI=$(node -p "process.versions.modules")
            echo "Building for Node $NODE_VER (ABI $ABI)..."
            rm -rf node_modules ~/.npm/_npx
            npm install --ignore-scripts
            cp prebuild/macOS/binding.gyp binding.gyp
            npx --yes node-gyp rebuild -j 2
            cp build/Release/canvas.node "/tmp/prebuilt-nodes/canvas-node-v${ABI}.node"
          done
          cp /tmp/prebuilt-nodes/canvas-node-v*.node build/Release/
          . prebuild/macOS/bundle.sh
      - name: Sign
        run: |
          for file in build/Release/*; do
            codesign --deep --force --sign - "$file"
          done
      - name: Test binary (all Node versions)
        run: |
          set -ex
          brew uninstall --force --ignore-dependencies cairo pango librsvg giflib harfbuzz
          source ~/.nvm/nvm.sh
          for NODE_VER in $NODE_VERSIONS; do
            nvm use $NODE_VER
            echo "=== Testing with Node $(node --version) (ABI $(node -p process.versions.modules)) ==="
            node test/smoke.js
          done
      - name: Package
        run: |
          source ~/.nvm/nvm.sh && nvm use 22
          node prebuild/package-platform.js darwin-arm64 build/Release
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-darwin-arm64
          path: build/Release/

  build-win32-x64:
    name: Windows x64
    runs-on: windows-2025
    steps:
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
      - uses: actions/checkout@v4
      - name: Install deps
        run: msys2 -c ". prebuild/Windows/preinstall.sh"
      - name: Build all Node versions
        shell: pwsh
        run: |
          msys2 -c "cp prebuild/Windows/binding.gyp binding.gyp"
          New-Item -ItemType Directory -Force "$env:TEMP\prebuilt-nodes" | Out-Null
          foreach ($NODE_VER in @(18, 20, 22, 24)) {
            Write-Host "=== Installing Node $NODE_VER ==="
            $shasums = Invoke-WebRequest -Uri "https://nodejs.org/dist/latest-v${NODE_VER}.x/SHASUMS256.txt" -UseBasicParsing
            $line = ($shasums.Content -split "`n" | Where-Object { $_ -match "win-x64\.zip" } | Select-Object -First 1)
            $filename = ($line -split "\s+")[1]
            $nodeVer = ($filename -replace "node-v" -replace "-win-x64\.zip")
            $url = "https://nodejs.org/dist/v${nodeVer}/node-v${nodeVer}-win-x64.zip"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\node-${NODE_VER}.zip"
            Remove-Item -Recurse -Force "$env:TEMP\node-${NODE_VER}" -ErrorAction SilentlyContinue
            Expand-Archive "$env:TEMP\node-${NODE_VER}.zip" -DestinationPath "$env:TEMP\node-${NODE_VER}"
            $nodeDir = (Get-ChildItem "$env:TEMP\node-${NODE_VER}" | Select-Object -First 1).FullName
            $env:PATH = "${nodeDir};$env:PATH"
            $ABI = & node -p "process.versions.modules"
            Write-Host "Building for Node $NODE_VER (v${nodeVer}, ABI $ABI)..."
            if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
            if (Test-Path "$env:LOCALAPPDATA\npm-cache\_npx") { Remove-Item -Recurse -Force "$env:LOCALAPPDATA\npm-cache\_npx" }
            npm install --ignore-scripts
            npx --yes node-gyp rebuild -j 2
            Copy-Item build/Release/canvas.node "$env:TEMP\prebuilt-nodes\canvas-node-v${ABI}.node"
          }
          Copy-Item "$env:TEMP\prebuilt-nodes\canvas-node-v*.node" build/Release/
      - name: Bundle
        shell: msys2 {0}
        run: . prebuild/Windows/bundle.sh
      - name: Test binary (all Node versions)
        shell: pwsh
        run: |
          foreach ($NODE_VER in @(18, 20, 22, 24)) {
            $nodeDir = (Get-ChildItem "$env:TEMP\node-${NODE_VER}" | Select-Object -First 1).FullName
            $env:PATH = "${nodeDir};$env:PATH"
            $ver = & node --version
            $abi = & node -p "process.versions.modules"
            Write-Host "=== Testing with Node $ver (ABI $abi) ==="
            & node test/smoke.js
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
      - name: Package
        run: |
          $nodeDir = (Get-ChildItem "$env:TEMP\node-22" | Select-Object -First 1).FullName
          $env:PATH = "${nodeDir};$env:PATH"
          node prebuild/package-platform.js win32-x64 build/Release
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-win32-x64
          path: build/Release/

  publish:
    name: Publish to npm
    needs:
      - validate
      - build-linux-x64
      - build-linux-arm64
      - build-darwin-x64
      - build-darwin-arm64
      - build-win32-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -ex
          for dir in artifacts/canvas-*/; do
            echo "Publishing $(cat $dir/package.json | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).name')"
            cd "$dir"
            npm publish --access public
            cd "$GITHUB_WORKSPACE"
          done

      - name: Wait for registry propagation
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGES=$(node -p "Object.keys(require('./package.json').optionalDependencies || {}).join(' ')")
          TIMEOUT=120
          INTERVAL=5
          for pkg in $PACKAGES; do
            echo "Waiting for ${pkg}@${VERSION}..."
            elapsed=0
            while true; do
              if npm view "${pkg}@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
                echo "  ${pkg}@${VERSION} available"
                break
              fi
              if [ "$elapsed" -ge "$TIMEOUT" ]; then
                echo "ERROR: Timed out waiting for ${pkg}@${VERSION}" >&2
                exit 1
              fi
              sleep $INTERVAL
              elapsed=$((elapsed + INTERVAL))
            done
          done
          echo "All platform packages available."

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  verify:
    name: Verify (${{ matrix.name }})
    needs: [publish]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: darwin-arm64
            os: macos-15
          - name: darwin-x64
            os: macos-15
            rosetta: true
          - name: win32-x64
            os: windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node.js versions (Unix)
        if: ${{ !matrix.rosetta && runner.os != 'Windows' }}
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
          source ~/.nvm/nvm.sh
          for v in 18 20 22 24; do nvm install $v; done

      - name: Setup Node.js versions (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          foreach ($v in @(18, 20, 22, 24)) {
            $shasums = Invoke-WebRequest -Uri "https://nodejs.org/dist/latest-v${v}.x/SHASUMS256.txt" -UseBasicParsing
            $line = ($shasums.Content -split "`n" | Where-Object { $_ -match "win-x64\.zip" } | Select-Object -First 1)
            $filename = ($line -split "\s+")[1]
            $nodeVer = ($filename -replace "node-v" -replace "-win-x64\.zip")
            Invoke-WebRequest -Uri "https://nodejs.org/dist/v${nodeVer}/node-v${nodeVer}-win-x64.zip" -OutFile "$env:TEMP\node-${v}.zip"
            Expand-Archive -Force "$env:TEMP\node-${v}.zip" -DestinationPath "$env:TEMP\node-${v}"
          }

      - name: Setup Rosetta + x64 Node.js versions
        if: ${{ matrix.rosetta }}
        run: |
          softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          arch -x86_64 /bin/bash -c "curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
          arch -x86_64 /bin/bash -c "source ~/.nvm/nvm.sh && for v in 18 20 22 24; do nvm install \$v; done"

      - name: Wait for platform package on this CDN edge
        if: ${{ !matrix.rosetta }}
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TIMEOUT=120
          INTERVAL=5
          elapsed=0
          echo "Waiting for prebuilt-canvas@${VERSION} on this edge..."
          while true; do
            if npm view "prebuilt-canvas@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
              echo "Available."
              break
            fi
            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "Timed out" >&2
              exit 1
            fi
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

      - name: Install and verify (Unix, all Node versions)
        if: ${{ !matrix.rosetta && runner.os != 'Windows' }}
        shell: bash
        run: |
          set -ex
          source ~/.nvm/nvm.sh
          npm cache clean --force
          mkdir test-install && cd test-install
          npm init -y
          nvm use 22
          npm install prebuilt-canvas@${GITHUB_REF_NAME#v}
          cat > verify.js << 'SCRIPT'
          const assert = require('assert');
          const c = require('prebuilt-canvas');
          assert(c.cairoVersion, 'cairoVersion missing');
          const cv = c.createCanvas(100, 100);
          cv.getContext('2d').fillRect(0, 0, 100, 100);
          assert(cv.toBuffer('image/png').length > 100, 'PNG too small');
          console.log('OK: ' + process.platform + '-' + process.arch + ' Node ' + process.version + ' cairo=' + c.cairoVersion);
          SCRIPT
          for NODE_VER in 18 20 22 24; do
            nvm use $NODE_VER
            echo "=== Verify with Node $(node --version) ==="
            node verify.js
          done

      - name: Install and verify (Windows, all Node versions)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          npm cache clean --force
          mkdir test-install; cd test-install
          npm init -y
          $nodeDir = (Get-ChildItem "$env:TEMP\node-22" | Select-Object -First 1).FullName
          $env:PATH = "${nodeDir};$env:PATH"
          npm install prebuilt-canvas@$($env:GITHUB_REF_NAME -replace '^v','')
          @"
          const assert = require('assert');
          const c = require('prebuilt-canvas');
          assert(c.cairoVersion, 'cairoVersion missing');
          const cv = c.createCanvas(100, 100);
          cv.getContext('2d').fillRect(0, 0, 100, 100);
          assert(cv.toBuffer('image/png').length > 100, 'PNG too small');
          console.log('OK: ' + process.platform + '-' + process.arch + ' Node ' + process.version + ' cairo=' + c.cairoVersion);
          "@ | Set-Content verify.js
          foreach ($v in @(18, 20, 22, 24)) {
            $nodeDir = (Get-ChildItem "$env:TEMP\node-${v}" | Select-Object -First 1).FullName
            $env:PATH = "${nodeDir};$env:PATH"
            Write-Host "=== Verify with Node $(& node --version) ==="
            & node verify.js
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Wait for platform package on this CDN edge (Rosetta)
        if: ${{ matrix.rosetta }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TIMEOUT=120
          INTERVAL=5
          elapsed=0
          echo "Waiting for prebuilt-canvas@${VERSION} on this edge..."
          while true; do
            if npm view "prebuilt-canvas@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
              echo "Available."
              break
            fi
            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "Timed out" >&2
              exit 1
            fi
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

      - name: Install and verify (Rosetta, all Node versions)
        if: ${{ matrix.rosetta }}
        run: |
          mkdir -p test-install
          cat > test-install/verify.js << 'SCRIPT'
          const assert = require("assert");
          const c = require("prebuilt-canvas");
          assert(c.cairoVersion, "cairoVersion missing");
          const cv = c.createCanvas(100, 100);
          cv.getContext("2d").fillRect(0, 0, 100, 100);
          assert(cv.toBuffer("image/png").length > 100, "PNG too small");
          console.log("OK: " + process.platform + "-" + process.arch + " Node " + process.version + " cairo=" + c.cairoVersion);
          SCRIPT
          arch -x86_64 /bin/bash -c "
            set -ex
            source ~/.nvm/nvm.sh
            nvm use 22
            cd test-install
            npm init -y
            npm install prebuilt-canvas@${GITHUB_REF_NAME#v}
            for NODE_VER in 18 20 22 24; do
              nvm use \$NODE_VER
              echo \"=== Verify with Node \$(node --version) ===\"
              node verify.js
            done
          "

      - name: Test package managers (Linux only)
        if: matrix.name == 'linux-x64'
        run: |
          set -ex
          TAG=${GITHUB_REF_NAME#v}

          # yarn classic
          npm install -g yarn
          mkdir t-yarn && cd t-yarn && npm init -y
          yarn add prebuilt-canvas@$TAG
          node -e "require('prebuilt-canvas')"
          cd ..

          # pnpm
          npm install -g pnpm
          mkdir t-pnpm && cd t-pnpm && npm init -y
          pnpm add prebuilt-canvas@$TAG
          node -e "require('prebuilt-canvas')"
